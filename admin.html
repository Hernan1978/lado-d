<!doctype html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Lado D</title>
  <style>
    :root{
      --bg:#24150f;
      --panel:#2f1c15;
      --line:rgba(255,255,255,.08);
      --text:#f1cfa8;
      --muted:#c39773;
      --red:#ff5a3c;
      --cyan:#5dcfff;
      --yellow:#f4d35b;
      --green:#7be35d;
      --pink:#ff63c7;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top,#3a241b 0%,var(--bg) 60%);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{max-width:1450px;margin:0 auto;padding:20px}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px
    }
    h1{
      margin:0;
      color:var(--red);
      font-size:clamp(1.8rem,3vw,3rem);
      line-height:1
    }
    .small{font-size:.85rem;color:var(--muted);margin-top:6px}
    .btn{
      border:0;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      background:#40261d;
      color:var(--text);
      border:1px solid var(--line);
      transition:transform .18s ease, background .18s ease, opacity .18s ease;
    }
    .btn:hover{transform:translateY(-1px);opacity:.95}
    .btn.primary{background:var(--red);color:#1b120f;font-weight:700}
    .btn.good{background:var(--green);color:#132010;font-weight:700}
    .btn.warn{background:var(--yellow);color:#201809;font-weight:700}
    .btn.danger{background:#7a2e28;color:#fff}
    .btn.exit{background:#3a1a2a;color:#ff63c7;border-color:rgba(255,99,199,.2);}
    .panel{
      background:rgba(47,28,21,.82);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      box-shadow:0 18px 50px rgba(0,0,0,.3);
      backdrop-filter:blur(8px);
    }
    .toolbar{
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr .8fr .8fr auto;
      gap:10px;
      margin-bottom:14px
    }
    input,select,textarea{
      width:100%;
      background:#20120e;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      font:inherit;
      outline:none;
    }
    textarea{min-height:90px;resize:vertical}
    .table-wrap{
      overflow:auto;
      border-radius:18px
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px;
      vertical-align:top;
      text-align:left
    }
    th{
      position:sticky;
      top:0;
      background:#2a1712;
      z-index:1;
      color:var(--muted);
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.12em
    }
    tr:hover td{background:rgba(255,255,255,.02)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .status-badge{
      display:inline-flex;
      padding:4px 8px;
      border-radius:999px;
      background:#40261d;
      border:1px solid var(--line);
      font-size:.8rem
    }
    .chk{width:18px;height:18px}
    .title-red{color:var(--red)}
    .title-cyan{color:var(--cyan)}
    .title-yellow{color:var(--yellow)}
    .title-green{color:var(--green)}
    .title-pink{color:var(--pink)}

    #previewModal, #imgModal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      z-index:9999;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .modal-card{
      max-width:900px;
      width:100%;
      background:#2f1c15;
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      padding:20px;
      box-shadow:0 18px 50px rgba(0,0,0,.5);
    }
    .modal-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px
    }
    .modal-top h2{
      margin:0;
      color:var(--red);
      font-size:1.6rem
    }
    #previewContent{
      padding:18px;
      border-radius:18px;
      background:#24150f;
      border:1px solid rgba(255,255,255,.08)
    }
    .preview-meta{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.8rem;
      margin-bottom:10px
    }
    .preview-title{
      margin:0 0 10px;
      font-size:2rem;
      line-height:1.1
    }
    .preview-excerpt{
      margin:0 0 14px;
      color:var(--text);
      font-size:1rem;
      white-space:pre-wrap
    }
    .preview-link{
      color:var(--cyan);
      word-break:break-all
    }
    .preview-footer{
      margin-top:12px;
      color:var(--green);
      font-size:.9rem
    }
    .img-preview{
      max-width:100%;
      border-radius:12px;
      margin-top:12px;
      display:none;
    }
    .img-result{
      margin-top:12px;
      padding:10px;
      background:#20120e;
      border-radius:12px;
      border:1px solid var(--line);
      color:var(--cyan);
      font-size:.85rem;
      word-break:break-all;
      display:none;
    }
    .upload-status{
      margin-top:8px;
      font-size:.85rem;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Panel de administración</h1>
        <div class="small">Editá, previsualizá y guardá los escritos directamente en Sheets.</div>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="newRow()">Nuevo escrito</button>
        <button class="btn good" onclick="reload()">Refrescar</button>
        <button class="btn warn" onclick="openImgModal()">Subir imagen</button>
        <button class="btn exit" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <input id="fSearch" placeholder="Buscar por título, categoría o extracto">
        <select id="fStatus">
          <option value="">Todos los estados</option>
          <option value="publicado">Publicado</option>
          <option value="borrador">Borrador</option>
        </select>
        <select id="fCategory">
          <option value="">Todas las categorías</option>
        </select>
        <select id="fFeatured">
          <option value="">Todos</option>
          <option value="true">Destacados</option>
          <option value="false">No destacados</option>
        </select>
        <input id="fId" placeholder="Filtrar por ID">
        <button class="btn warn" onclick="applyFilters()">Aplicar</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Fecha</th><th>Título</th><th>Categoría</th><th>Extracto</th><th>Link</th><th>Destacado</th><th>Orden</th><th>Estado</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL PREVIEW -->
  <div id="previewModal">
    <div class="modal-card">
      <div class="modal-top">
        <h2>Vista previa</h2>
        <button class="btn" onclick="closePreview()">Cerrar</button>
      </div>
      <div id="previewContent"></div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap">
        <button class="btn" onclick="closePreview()">Seguir editando</button>
        <button class="btn primary" onclick="saveFromPreview()">Guardar ahora</button>
      </div>
    </div>
  </div>

  <!-- MODAL IMAGEN -->
  <div id="imgModal">
    <div class="modal-card" style="max-width:500px;">
      <div class="modal-top">
        <h2>Subir imagen</h2>
        <button class="btn" onclick="closeImgModal()">Cerrar</button>
      </div>
      <input type="file" id="imgFile" accept="image/*" onchange="previewImg(this)">
      <img id="imgPreview" class="img-preview">
      <div class="upload-status" id="uploadStatus"></div>
      <div class="img-result" id="imgResult"></div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">
        <button class="btn" onclick="closeImgModal()">Cancelar</button>
        <button class="btn primary" onclick="uploadImg()">Subir a Drive</button>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = '1234';
    const ingresada = prompt('Ingresá la contraseña para acceder al panel:');
    if (ingresada !== PASSWORD) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#ff5a3c;font-size:1.2rem;">Acceso denegado.</div>';
      throw new Error('Acceso denegado');
    }

    let allPosts = [];
    let visiblePosts = [];
    let previewData = null;

    function salir(){
      if (confirm('¿Salir del panel?')) {
        window.location.href = '/';
      }
    }

    function esc(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;');
    }

    function colorForCategory(cat){
      const c = String(cat || '').toLowerCase();
      if (c.includes('buenos')) return 'var(--red)';
      if (c.includes('grab')) return 'var(--cyan)';
      if (c.includes('lanz')) return 'var(--yellow)';
      if (c.includes('gira')) return 'var(--green)';
      if (c.includes('leg')) return 'var(--pink)';
      return 'var(--red)';
    }

    function colorClass(cat){
      const c = String(cat || '').toLowerCase();
      if (c.includes('buenos')) return 'title-red';
      if (c.includes('grab')) return 'title-cyan';
      if (c.includes('lanz')) return 'title-yellow';
      if (c.includes('gira')) return 'title-green';
      if (c.includes('leg')) return 'title-pink';
      return '';
    }

    function reload(){
      google.script.run.withSuccessHandler(data => {
        allPosts = data || [];
        fillCategoryFilter();
        applyFilters();
      }).getPosts();
    }

    function fillCategoryFilter(){
      const sel = document.getElementById('fCategory');
      const cats = [...new Set(allPosts.map(p => p.category).filter(Boolean))];
      const current = sel.value;
      sel.innerHTML = '<option value="">Todas las categorías</option>' + cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      sel.value = current;
    }

    function applyFilters(){
      const q = document.getElementById('fSearch').value.trim().toLowerCase();
      const status = document.getElementById('fStatus').value;
      const category = document.getElementById('fCategory').value;
      const featured = document.getElementById('fFeatured').value;
      const idv = document.getElementById('fId').value.trim().toLowerCase();

      visiblePosts = allPosts.filter(p => {
        const hay = `${p.id} ${p.title} ${p.category} ${p.excerpt}`.toLowerCase();
        if (q && !hay.includes(q)) return false;
        if (status && String(p.status).toLowerCase() !== status) return false;
        if (category && p.category !== category) return false;
        if (featured !== '' && String(!!p.featured) !== featured) return false;
        if (idv && !String(p.id).toLowerCase().includes(idv)) return false;
        return true;
      });
      render();
    }

    function rowEditor(p){
      return `
        <tr data-row="${p.rowNumber}">
          <td><input value="${esc(p.id)}" data-k="id"></td>
          <td><input value="${esc(p.date)}" data-k="date"></td>
          <td><input value="${esc(p.title)}" data-k="title" class="${colorClass(p.category)}"></td>
          <td><input value="${esc(p.category)}" data-k="category"></td>
          <td><textarea data-k="excerpt">${esc(p.excerpt)}</textarea></td>
          <td><input value="${esc(p.link)}" data-k="link"></td>
          <td style="text-align:center"><input class="chk" type="checkbox" data-k="featured" ${p.featured ? 'checked' : ''}></td>
          <td><input value="${esc(p.order)}" data-k="order"></td>
          <td>
            <select data-k="status">
              <option value="publicado" ${String(p.status).toLowerCase()==='publicado'?'selected':''}>Publicado</option>
              <option value="borrador" ${String(p.status).toLowerCase()==='borrador'?'selected':''}>Borrador</option>
            </select>
          </td>
          <td>
            <div class="actions">
              <button class="btn warn" onclick="previewRow(this)">Vista previa</button>
              <button class="btn primary" onclick="saveRow(this)">Guardar</button>
              <button class="btn danger" onclick="delRow(this)">Borrar</button>
            </div>
          </td>
        </tr>
      `;
    }

    function render(){
      document.getElementById('rows').innerHTML = visiblePosts.map(rowEditor).join('');
    }

    function getRowDataFromTr(tr){
      const get = k => tr.querySelector(`[data-k="${k}"]`);
      return {
        rowNumber: tr.dataset.row,
        id: get('id').value,
        date: get('date').value,
        title: get('title').value,
        category: get('category').value,
        excerpt: get('excerpt').value,
        link: get('link').value,
        featured: get('featured').checked,
        order: get('order').value,
        status: get('status').value
      };
    }

    function previewRow(btn){
      const tr = btn.closest('tr');
      previewData = getRowDataFromTr(tr);
      document.getElementById('previewContent').innerHTML = `
        <div class="preview-meta">${esc(previewData.category)} · ${esc(previewData.date)} · ${esc(previewData.status)}</div>
        <h3 class="preview-title" style="color:${colorForCategory(previewData.category)}">${esc(previewData.title)}</h3>
        <p class="preview-excerpt">${esc(previewData.excerpt)}</p>
        <div class="preview-link">${esc(previewData.link)}</div>
        <div class="preview-footer">${previewData.featured ? 'Destacado' : 'No destacado'}</div>
      `;
      document.getElementById('previewModal').style.display = 'flex';
    }

    function closePreview(){
      document.getElementById('previewModal').style.display = 'none';
    }

    function saveFromPreview(){
      if (!previewData) return;
      google.script.run.withSuccessHandler(() => {
        closePreview();
        reload();
      }).savePost(previewData);
    }

    function saveRow(btn){
      const tr = btn.closest('tr');
      google.script.run.withSuccessHandler(reload).savePost(getRowDataFromTr(tr));
    }

    function delRow(btn){
      const tr = btn.closest('tr');
      if (!confirm('¿Borrar este escrito?')) return;
      google.script.run.withSuccessHandler(reload).deletePost(tr.dataset.row);
    }

    function newRow(){
      const row = {
        rowNumber: 0,
        id: '',
        date: '',
        title: '',
        category: '',
        excerpt: '',
        link: '',
        featured: false,
        order: (allPosts.length + 1),
        status: 'borrador'
      };
      allPosts = [row, ...allPosts];
      visiblePosts = [row, ...visiblePosts];
      render();
      window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
    }

    function openImgModal(){
      document.getElementById('imgModal').style.display = 'flex';
      document.getElementById('imgResult').style.display = 'none';
      document.getElementById('imgResult').textContent = '';
      document.getElementById('uploadStatus').textContent = '';
      document.getElementById('imgPreview').style.display = 'none';
      document.getElementById('imgFile').value = '';
    }

    function closeImgModal(){
      document.getElementById('imgModal').style.display = 'none';
    }

    function previewImg(input){
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('imgPreview');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function uploadImg(){
      const file = document.getElementById('imgFile').files[0];
      if (!file) { alert('Elegí una imagen primero.'); return; }
      const status = document.getElementById('uploadStatus');
      const result = document.getElementById('imgResult');
      status.textContent = 'Subiendo...';
      result.style.display = 'none';

      const reader = new FileReader();
      reader.onload = e => {
        const base64 = e.target.result.split(',')[1];
        google.script.run
          .withSuccessHandler(url => {
            status.textContent = '✅ Imagen subida. Copiá el link:';
            result.textContent = url;
            result.style.display = 'block';
          })
          .withFailureHandler(err => {
            status.textContent = '❌ Error: ' + err.message;
          })
          .uploadImage(base64, file.name, file.type);
      };
      reader.readAsDataURL(file);
    }

    ['fSearch','fStatus','fCategory','fFeatured','fId'].forEach(id => {
      document.addEventListener('input', e => {
        if (e.target.id === id) applyFilters();
      });
      document.addEventListener('change', e => {
        if (e.target.id === id) applyFilters();
      });
    });

    reload();
  </script>
</body>
</html>
