<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar - Lado D</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/eye-favicon.svg?v=3" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .search-section {
            background: var(--gris-oscuro);
            border-bottom: 1px solid rgba(139,26,26,0.3);
            padding: 40px 20px;
        }
        .search-container {
            max-width: 860px;
            margin: 0 auto;
        }
        .search-container h2 {
            font-family: var(--font-title);
            color: var(--crema);
            margin-bottom: 28px;
            text-align: center;
            font-size: 1.8rem;
        }
        .search-container h2 i {
            color: var(--rojo-claro);
            margin-right: 10px;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gris-medio);
            border: 1px solid var(--gris-borde);
            padding: 16px 22px;
            transition: border-color 0.2s;
        }
        .search-box:focus-within {
            border-color: var(--rojo);
        }
        .search-box i { color: var(--texto-suave); }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--crema);
        }
        .search-box input::placeholder { color: var(--texto-suave); }
        .articles-section { margin-top: 10px; }
        #resultsCount {
            font-size: 1rem;
            color: var(--texto-suave);
            margin-left: 12px;
            font-family: var(--font-body);
        }
        .search-page-header {
            background: var(--gris-oscuro);
            padding: 20px;
            border-bottom: 1px solid rgba(139,26,26,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .search-page-header-content {
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .search-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }
        .search-logo img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--rojo);
        }
        .search-logo span {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--crema);
        }
        .search-logo span b { color: var(--rojo-claro); }
        .search-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .search-nav a {
            color: var(--crema-suave);
            text-decoration: none;
            font-size: 0.88rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .search-nav a:hover { opacity: 1; }
        .search-nav .ig-btn {
            padding: 7px 16px;
            border: 1px solid var(--rojo);
            color: var(--rojo-claro);
            opacity: 1;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .search-nav .ig-btn:hover {
            background: var(--rojo);
            color: var(--crema);
        }
    </style>
</head>
<body>

    <header class="search-page-header">
        <div class="search-page-header-content">
            <a href="index.html" class="search-logo">
                <img src="carlos.jpg" alt="Carlos Argentina">
                <span>Lado <b>D</b></span>
            </a>
            <nav class="search-nav">
                <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
                <a href="https://instagram.com/ladob.argentina" target="_blank" class="ig-btn">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </nav>
        </div>
    </header>

    <section class="search-section">
        <div class="search-container">
            <h2><i class="fas fa-search"></i>Buscar todo el contenido</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInputMain" placeholder="Buscar por título, tema, artista, banda...">
            </div>
        </div>
    </section>

    <main class="content">
        <section class="articles-section">
            <div class="feed-header">
                <h2 class="section-title">
                    <i class="fas fa-list"></i> Resultados
                    <span id="resultsCount"></span>
                </h2>
            </div>
            <div class="articles-grid" id="searchResultsGrid"></div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p class="quote">"Si algo pasó en Argentina, yo tengo una opinión. Puede estar mal, pero es mía."</p>
            <p class="footer-text">LADO D — Carlos Argentina &copy; 2026</p>
            <div class="footer-links">
                <a href="index.html" class="footer-link"><i class="fas fa-home"></i> Inicio</a>
                <a href="admin.html" class="footer-link"><i class="fas fa-cog"></i> Admin</a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="search.js"></script>
</body>
</html>
