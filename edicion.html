<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#160f0c" />
  <title>Edición · LADO D</title>
  <link rel="icon" type="image/png" href="pluma.png" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .edicion-wrap{
      width:min(960px,92vw);
      margin:0 auto;
      padding:40px 0 80px;
    }

    .edicion-volver{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:.85rem;
      margin-bottom:32px;
      letter-spacing:.08em;
    }
    .edicion-volver:hover{ color:var(--text); }

    /* TAPA */
    .fanzine-tapa{
      position:relative;
      margin-bottom:3.5rem;
      padding:2.5rem;
      border:2px solid rgba(255,255,255,.15);
      background:linear-gradient(135deg, rgba(255,90,60,.04), rgba(255,255,255,.02));
      overflow:hidden;
    }

    .fanzine-tapa::after{
      content:'';
      position:absolute;
      top:-30px;
      right:-30px;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(255,90,60,.12), transparent 70%);
      pointer-events:none;
    }

    .fanzine-tapa::before{
      content:'LADO D';
      position:absolute;
      bottom:-10px;
      right:-5px;
      font-size:120px;
      font-weight:900;
      color:rgba(255,255,255,.03);
      line-height:1;
      pointer-events:none;
      font-family:'Playfair Display', serif;
    }

    .fanzine-kicker{
      font-family:'Special Elite', monospace;
      font-size:.7rem;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:.75rem;
      border-bottom:1px solid rgba(255,255,255,.08);
      padding-bottom:.75rem;
    }

    .fanzine-header{
      display:grid;
      grid-template-columns:1fr auto;
      gap:2rem;
      align-items:start;
      margin-bottom:2rem;
    }

    .fanzine-numero{
      font-family:'Playfair Display', serif;
      font-size:clamp(3.5rem,9vw,7rem);
      font-weight:700;
      color:var(--accent);
      line-height:.9;
      text-shadow:4px 4px 0 rgba(255,90,60,.15);
    }

    .fanzine-nombre{
      font-family:'Playfair Display', serif;
      font-size:clamp(1.6rem,4vw,2.8rem);
      font-weight:700;
      color:var(--text);
      line-height:1.15;
      margin-bottom:.5rem;
    }

    .fanzine-fecha{
      font-family:'Special Elite', monospace;
      font-size:.8rem;
      color:var(--muted);
      letter-spacing:.1em;
    }

    .fanzine-sello{
      width:90px;
      height:90px;
      border-radius:50%;
      border:2px solid var(--accent);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      flex-shrink:0;
      padding:8px;
    }

    .fanzine-sello-top{
      font-family:'Special Elite', monospace;
      font-size:.55rem;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .fanzine-sello-num{
      font-size:1.8rem;
      font-weight:900;
      color:var(--accent);
      line-height:1;
    }

    .fanzine-sello-bottom{
      font-family:'Special Elite', monospace;
      font-size:.5rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .fanzine-carlos{
      display:flex;
      gap:1.25rem;
      align-items:flex-start;
      background:rgba(255,255,255,.02);
      border-left:3px solid var(--accent);
      padding:1rem 1.25rem;
    }

    .fanzine-carlos-img{
      width:64px;
      height:64px;
      object-fit:cover;
      border-radius:50%;
      flex-shrink:0;
      filter:grayscale(.4) contrast(1.1);
      border:1.5px solid rgba(255,90,60,.4);
    }

    .fanzine-carlos-texto{
      font-family:'Special Elite', monospace;
      font-size:.88rem;
      line-height:1.7;
      color:var(--muted);
      font-style:italic;
    }

    .fanzine-carlos-firma{
      font-family:'Special Elite', monospace;
      font-size:.75rem;
      color:var(--accent);
      margin-top:.4rem;
    }

    /* NOTAS */
    .fanzine-notas{
      display:grid;
      gap:0;
    }

    .fanzine-nota{
      position:relative;
      padding:2rem 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .fanzine-nota:nth-child(odd){
      padding-right:2rem;
    }

    .fanzine-nota:nth-child(even){
      padding-left:2rem;
      border-left:1px solid rgba(255,255,255,.06);
    }

    .fanzine-nota-num{
      font-family:'Special Elite', monospace;
      font-size:.65rem;
      letter-spacing:.25em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:.5rem;
    }

    .fanzine-nota-titulo{
      font-family:'Playfair Display', serif;
      font-size:clamp(1.4rem,3.5vw,2rem);
      font-weight:700;
      color:var(--text);
      line-height:1.15;
      margin-bottom:.75rem;
    }

    .fanzine-nota-titulo em{
      font-style:italic;
      color:var(--accent);
    }

    .fanzine-nota-meta{
      font-family:'Special Elite', monospace;
      font-size:.72rem;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:1rem;
      display:flex;
      gap:1rem;
      flex-wrap:wrap;
    }

    .fanzine-nota-img{
      width:100%;
      max-height:320px;
      object-fit:cover;
      margin-bottom:1.25rem;
      filter:contrast(1.05) saturate(.85);
    }

    .fanzine-nota-img.img-derecha{
      float:right;
      width:42%;
      max-height:200px;
      margin:0 0 1rem 1.5rem;
    }

    .fanzine-nota-resumen{
      font-family:'Playfair Display', serif;
      font-size:1.05rem;
      color:var(--text);
      line-height:1.65;
      margin-bottom:1rem;
      font-style:italic;
    }

    .fanzine-nota-contenido{
      font-size:.92rem;
      line-height:1.85;
      color:var(--muted);
      white-space:pre-wrap;
    }

    .fanzine-separador{
      font-family:'Special Elite', monospace;
      font-size:.7rem;
      letter-spacing:.4em;
      color:rgba(255,255,255,.15);
      text-align:center;
      padding:1.5rem 0 0;
      clear:both;
    }

    .fanzine-error{
      text-align:center;
      padding:80px 20px;
      color:var(--muted);
      font-family:'Special Elite', monospace;
    }

    @media(max-width:600px){
      .fanzine-header{ grid-template-columns:1fr; }
      .fanzine-sello{ display:none; }
      .fanzine-nota:nth-child(even){ padding-left:0; border-left:none; }
      .fanzine-nota-img.img-derecha{ float:none; width:100%; margin:0 0 1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="edicion-wrap">
    <a class="edicion-volver" href="/">← Volver a Lado D</a>
    <div id="edicionContenido">
      <div class="fanzine-error">Cargando edición...</div>
    </div>
  </div>

  <script>
    const SHEET_API = 'https://script.google.com/macros/s/AKfycbxfEtCvNYk3cWjuhLk2giOX2W1dPFo5I0Z761DK90jRUPGsFK0WsOs5lRvLNo7kxyEt/exec';

    async function loadEdicion(){
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const container = document.getElementById('edicionContenido');

      if (!id) {
        container.innerHTML = '<div class="fanzine-error">No se especificó ninguna edición.</div>';
        return;
      }

      try {
        const resEd = await fetch(`${SHEET_API}?sheet=ediciones`);
        const dataEd = await resEd.json();
        const edicion = (dataEd.items || []).find(e => String(e.id) === String(id));

        if (!edicion) {
          container.innerHTML = '<div class="fanzine-error">Edición no encontrada.</div>';
          return;
        }

        const resNotas = await fetch(`${SHEET_API}?edicion=${encodeURIComponent(edicion.fecha)}`);
        const dataNotas = await resNotas.json();
        const notas = dataNotas.items || [];

        document.title = `${edicion.nombre} · Lado D`;

        const notasHTML = notas.length === 0
          ? '<p style="color:var(--muted);text-align:center;padding:2rem 0;font-family:Special Elite,monospace;">No hay notas en esta edición todavía.</p>'
          : notas.map((n, i) => {
              const imgClass = i % 2 === 0 ? 'img-derecha' : '';
              return `
                <div class="fanzine-nota">
                  <div class="fanzine-nota-num">— Nota ${i + 1} de ${notas.length}</div>
                  <div class="fanzine-nota-titulo">${n.titulo || ''}</div>
                  <div class="fanzine-nota-meta">
                    <span>${n.fecha || ''}</span>
                    ${n.categoria ? `<span>${n.categoria}</span>` : ''}
                  </div>
                  ${n.imagen ? `<img class="fanzine-nota-img ${imgClass}" src="${n.imagen}" alt="${n.titulo}">` : ''}
                  <p class="fanzine-nota-resumen">${n.resumen || ''}</p>
                  <div class="fanzine-nota-contenido">${n.contenido || ''}</div>
                  <div class="fanzine-separador">· · · · ·</div>
                </div>
              `;
            }).join('');

        container.innerHTML = `
          <div class="fanzine-tapa">
            <div class="fanzine-kicker">Lado D · Archivo con criterio · Argentina sin filtros</div>
            <div class="fanzine-header">
              <div>
                <div class="fanzine-numero">N°${edicion.id}</div>
                <div class="fanzine-nombre">${edicion.nombre}</div>
                <div class="fanzine-fecha">${edicion.fecha}</div>
              </div>
              <div class="fanzine-sello">
                <div class="fanzine-sello-top">Lado D</div>
                <div class="fanzine-sello-num">${edicion.id}</div>
                <div class="fanzine-sello-bottom">edición</div>
              </div>
            </div>
            <div class="fanzine-carlos">
              <img src="carlos.jpg" alt="Carlos" class="fanzine-carlos-img">
              <div>
                <div class="fanzine-carlos-texto">${edicion.descripcion || ''}</div>
                <div class="fanzine-carlos-firma">— Carlos de Argentina</div>
              </div>
            </div>
          </div>
          <div class="fanzine-notas">
            ${notasHTML}
          </div>
        `;

      } catch(err) {
        container.innerHTML = '<div class="fanzine-error">Error al cargar la edición.</div>';
      }
    }

    loadEdicion();
  </script>
</body>
</html>
