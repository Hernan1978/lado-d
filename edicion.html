<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#160f0c" />
  <title>Edición · LADO D</title>
  <link rel="icon" type="image/png" href="pluma.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

    .edicion-wrap{
      width:min(900px,92vw);
      margin:0 auto;
      padding:40px 0 80px;
    }

    .edicion-volver{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:.85rem;
      margin-bottom:32px;
      letter-spacing:.08em;
    }
    .edicion-volver:hover{ color:var(--text); }

    .fanzine-tapa{
      position:relative;
      border:3px solid var(--text);
      padding:2rem;
      margin-bottom:3rem;
      background:rgba(255,255,255,.02);
    }

    .fanzine-tapa::before{
      content:'';
      position:absolute;
      inset:4px;
      border:1px solid rgba(255,255,255,.1);
      pointer-events:none;
    }

    .fanzine-kicker{
      font-family:'Special Elite', monospace;
      font-size:.75rem;
      letter-spacing:.3em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:.5rem;
    }

    .fanzine-numero{
      font-size:clamp(3rem,8vw,6rem);
      font-weight:900;
      color:var(--accent);
      line-height:1;
      margin-bottom:.25rem;
      text-shadow:3px 3px 0 rgba(255,90,60,.2);
    }

    .fanzine-nombre{
      font-size:clamp(1.4rem,4vw,2.4rem);
      font-weight:700;
      color:var(--text);
      line-height:1.2;
      margin-bottom:1.5rem;
      border-bottom:2px solid var(--accent);
      padding-bottom:1rem;
    }

    .fanzine-carlos{
      display:flex;
      gap:1.5rem;
      align-items:flex-start;
    }

    .fanzine-carlos-img{
      width:80px;
      height:80px;
      object-fit:cover;
      border-radius:50%;
      border:2px solid var(--accent);
      flex-shrink:0;
      filter:grayscale(.3);
    }

    .fanzine-carlos-texto{
      font-family:'Special Elite', monospace;
      font-size:.95rem;
      line-height:1.7;
      color:var(--muted);
      font-style:italic;
    }

    .fanzine-carlos-firma{
      font-family:'Special Elite', monospace;
      font-size:.8rem;
      color:var(--accent);
      margin-top:.5rem;
    }

    .fanzine-notas{
      display:grid;
      gap:2rem;
    }

    .fanzine-nota{
      position:relative;
      border-left:3px solid var(--accent);
      padding:1.5rem 1.5rem 1.5rem 2rem;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .fanzine-nota-num{
      position:absolute;
      top:-14px;
      left:1.5rem;
      background:var(--accent);
      color:#1b120f;
      font-size:.7rem;
      font-weight:900;
      letter-spacing:.15em;
      padding:2px 10px;
      text-transform:uppercase;
    }

    .fanzine-nota-meta{
      font-family:'Special Elite', monospace;
      font-size:.75rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:.5rem;
    }

    .fanzine-nota-titulo{
      font-size:clamp(1.3rem,3vw,1.8rem);
      font-weight:700;
      color:var(--text);
      line-height:1.2;
      margin-bottom:.75rem;
    }

    .fanzine-nota-img{
      width:100%;
      max-height:280px;
      object-fit:cover;
      margin-bottom:1rem;
      filter:contrast(1.05) saturate(.9);
    }

    .fanzine-nota-resumen{
      font-size:1rem;
      color:var(--muted);
      border-left:2px solid rgba(255,255,255,.1);
      padding-left:1rem;
      margin-bottom:1rem;
      font-style:italic;
      line-height:1.6;
    }

    .fanzine-nota-contenido{
      font-size:.95rem;
      line-height:1.8;
      color:var(--text);
      white-space:pre-wrap;
    }

    .fanzine-separador{
      text-align:center;
      color:var(--muted);
      font-family:'Special Elite', monospace;
      font-size:.8rem;
      letter-spacing:.3em;
      margin:1.5rem 0 0;
    }

    .fanzine-error{
      text-align:center;
      padding:80px 20px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="edicion-wrap">
    <a class="edicion-volver" href="/">← Volver a Lado D</a>
    <div id="edicionContenido">
      <div class="fanzine-error">Cargando edición...</div>
    </div>
  </div>

  <script>
    const SHEET_API = 'https://script.google.com/macros/s/AKfycbxfEtCvNYk3cWjuhLk2giOX2W1dPFo5I0Z761DK90jRUPGsFK0WsOs5lRvLNo7kxyEt/exec';

    async function loadEdicion(){
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const container = document.getElementById('edicionContenido');

      if (!id) {
        container.innerHTML = '<div class="fanzine-error">No se especificó ninguna edición.</div>';
        return;
      }

      try {
        // Cargar datos de la edición
        const resEd = await fetch(`${SHEET_API}?sheet=ediciones`);
        const dataEd = await resEd.json();
        const edicion = (dataEd.items || []).find(e => String(e.id) === String(id));

        if (!edicion) {
          container.innerHTML = '<div class="fanzine-error">Edición no encontrada.</div>';
          return;
        }

        // Cargar notas de la edición
        const resNotas = await fetch(`${SHEET_API}?edicion=${encodeURIComponent(edicion.fecha)}`);
        const dataNotas = await resNotas.json();
        const notas = dataNotas.items || [];

        document.title = `${edicion.nombre} · Lado D`;

        const notasHTML = notas.length === 0
          ? '<p style="color:var(--muted);text-align:center;padding:2rem 0;">No hay notas en esta edición todavía.</p>'
          : notas.map((n, i) => `
            <div class="fanzine-nota">
              <div class="fanzine-nota-num">Nota ${i + 1}</div>
              <div class="fanzine-nota-meta">${n.fecha || ''} ${n.categoria ? '· ' + n.categoria : ''}</div>
              <div class="fanzine-nota-titulo">${n.titulo || ''}</div>
              ${n.imagen ? `<img class="fanzine-nota-img" src="${n.imagen}" alt="${n.titulo}">` : ''}
              <p class="fanzine-nota-resumen">${n.resumen || ''}</p>
              <div class="fanzine-nota-contenido">${n.contenido || ''}</div>
              <div class="fanzine-separador">· · ·</div>
            </div>
          `).join('');

        container.innerHTML = `
          <div class="fanzine-tapa">
            <div class="fanzine-kicker">Lado D · Archivo con criterio</div>
            <div class="fanzine-numero">N° ${edicion.id}</div>
            <div class="fanzine-nombre">${edicion.nombre}</div>
            <div class="fanzine-carlos">
              <img src="carlos.jpg" alt="Carlos" class="fanzine-carlos-img">
              <div>
                <div class="fanzine-carlos-texto">${edicion.descripcion || ''}</div>
                <div class="fanzine-carlos-firma">— Carlos de Argentina</div>
              </div>
            </div>
          </div>
          <div class="fanzine-notas">
            ${notasHTML}
          </div>
        `;

      } catch(err) {
        container.innerHTML = '<div class="fanzine-error">Error al cargar la edición.</div>';
      }
    }

    loadEdicion();
  </script>
</body>
</html>
