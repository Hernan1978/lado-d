<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVOS VIDAL - Cultura argentina sin filtros</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:400,700&family=Lora:400,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="bohemio-image-container">
                    <img src="lucid-origin_Hombre_argentino_de_tez_morena_con_barba_descuidada_y_cabello_largo_y_ondulado_v-0.jpg" alt="Vidal bohemio" class="bohemio-image">
                    <div class="image-glow"></div>
                </div>
            </div>

            <div class="title-section">
                <h1 class="main-title">ARCHIVOS VIDAL</h1>
                <p class="subtitle">Un poco de historia, no viene mal...</p>
                <p class="description">Historia argentina sin filtros. Música, baile, bandas. Lo que los manuales prefirieron omitir.</p>
            </div>

            <div class="social-links">
                <a href="https://instagram.com" target="_blank" class="instagram-link" id="instagramLink">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>
        </div>
    </header>

    <section class="search-section">
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por título, tema o artista...">
            </div>

            <div class="filters">
                <button class="filter-btn active" data-category="all">Todos</button>
                <button class="filter-btn" data-category="historia">Historia</button>
                <button class="filter-btn" data-category="musica">Música</button>
                <button class="filter-btn" data-category="baile">Baile</button>
                <button class="filter-btn" data-category="bandas">Bandas</button>
            </div>
        </div>
    </section>

    <main class="content">
        <section class="articles-section">
            <h2 class="section-title">
                <i class="fas fa-star"></i> Destacados
            </h2>

            <div class="articles-grid" id="articlesGrid">
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p class="quote">"La historia no es lo que nos dicen, es lo que investigamos"</p>
            <p class="footer-text">ARCHIVOS VIDAL &copy; 2026</p>
            <div class="footer-links">
                <a href="search.html" class="footer-link">
                    <i class="fas fa-search"></i> Buscar
                </a>
                <a href="admin.html" class="footer-link">
                    <i class="fas fa-cog"></i> Admin
                </a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
